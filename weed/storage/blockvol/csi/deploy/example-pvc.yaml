apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sw-block-test
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: sw-block
  resources:
    requests:
      storage: 100Mi
---
apiVersion: v1
kind: Pod
metadata:
  name: sw-block-test-pod
spec:
  containers:
    - name: app
      image: busybox
      command: ["sh", "-c", "echo 'hello sw-block' > /data/test.txt && cat /data/test.txt && sleep 3600"]
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: sw-block-test
