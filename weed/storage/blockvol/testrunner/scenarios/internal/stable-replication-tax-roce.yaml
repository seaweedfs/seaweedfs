name: stable-replication-tax-roce
timeout: 10m

# Replication tax on 25Gbps RoCE network (10.0.0.x).
# Compares RF=1, RF=2 best_effort, RF=2 sync_all.
#
# Previous run on 1Gbps (192.168.1.x):
#   RF=1: 54,650 IOPS  |  RF=2 be: 22,773  |  RF=2 sa: 23,846
#   Replication tax: ~58% — mostly 1Gbps wire limit
#
# RoCE (25Gbps) should remove the wire bottleneck and show
# the true protocol overhead.

env:
  master_url: "http://10.0.0.3:9433"
  vol_size: "1073741824"

topology:
  nodes:
    m01:
      host: 192.168.1.181
      user: testdev
      key: "/opt/work/testdev_key"
    m02:
      host: 192.168.1.184
      user: testdev
      key: "/opt/work/testdev_key"

phases:
  - name: cluster-start
    actions:
      - action: exec
        node: m02
        cmd: "fuser -k 9433/tcp 18480/tcp 2>/dev/null; sleep 1; rm -rf /tmp/sw-roce-master /tmp/sw-roce-vs1 && mkdir -p /tmp/sw-roce-master /tmp/sw-roce-vs1/blocks"
        root: "true"
        ignore_error: true
      - action: exec
        node: m01
        cmd: "fuser -k 18480/tcp 2>/dev/null; sleep 1; rm -rf /tmp/sw-roce-vs2 && mkdir -p /tmp/sw-roce-vs2/blocks"
        root: "true"
        ignore_error: true

      # Master on m02, listening on RoCE IP.
      - action: start_weed_master
        node: m02
        port: "9433"
        dir: /tmp/sw-roce-master
        extra_args: "-ip=10.0.0.3"
        save_as: master_pid

      - action: sleep
        duration: 3s

      # VS1 on m02, advertising RoCE IP.
      - action: start_weed_volume
        node: m02
        port: "18480"
        master: "10.0.0.3:9433"
        dir: /tmp/sw-roce-vs1
        extra_args: "-block.dir=/tmp/sw-roce-vs1/blocks -block.listen=:3295 -ip=10.0.0.3"
        save_as: vs1_pid

      # VS2 on m01, advertising RoCE IP.
      - action: start_weed_volume
        node: m01
        port: "18480"
        master: "10.0.0.3:9433"
        dir: /tmp/sw-roce-vs2
        extra_args: "-block.dir=/tmp/sw-roce-vs2/blocks -block.listen=:3295 -ip=10.0.0.1"
        save_as: vs2_pid

      - action: sleep
        duration: 3s

      - action: wait_cluster_ready
        node: m02
        master_url: "{{ master_url }}"

      - action: wait_block_servers
        count: "2"

  # === RF=1: No replication ===
  - name: rf1-test
    actions:
      - action: create_block_volume
        name: "roce-rf1"
        size_bytes: "{{ vol_size }}"
        replica_factor: "1"
        durability_mode: "best_effort"

      - action: sleep
        duration: 2s

      - action: lookup_block_volume
        name: "roce-rf1"
        save_as: rf1

      - action: iscsi_login_direct
        node: m01
        host: "{{ rf1_iscsi_host }}"
        port: "{{ rf1_iscsi_port }}"
        iqn: "{{ rf1_iqn }}"
        save_as: dev_rf1

      - action: fio_json
        node: m01
        device: "{{ dev_rf1 }}"
        rw: randwrite
        bs: 4k
        iodepth: "16"
        runtime: "30"
        time_based: "true"
        name: rf1
        save_as: fio_rf1

      - action: fio_parse
        json_var: fio_rf1
        metric: iops
        save_as: iops_rf1

      - action: print
        msg: "RF=1 (RoCE):       {{ iops_rf1 }} IOPS"

      - action: iscsi_cleanup
        node: m01
        ignore_error: true

  # === RF=2 best_effort ===
  - name: rf2-best-effort
    actions:
      - action: create_block_volume
        name: "roce-rf2be"
        size_bytes: "{{ vol_size }}"
        replica_factor: "2"
        durability_mode: "best_effort"

      - action: wait_volume_healthy
        name: "roce-rf2be"
        timeout: 60s

      - action: lookup_block_volume
        name: "roce-rf2be"
        save_as: rf2be

      - action: iscsi_login_direct
        node: m01
        host: "{{ rf2be_iscsi_host }}"
        port: "{{ rf2be_iscsi_port }}"
        iqn: "{{ rf2be_iqn }}"
        save_as: dev_rf2be

      - action: fio_json
        node: m01
        device: "{{ dev_rf2be }}"
        rw: randwrite
        bs: 4k
        iodepth: "16"
        runtime: "30"
        time_based: "true"
        name: rf2-best-effort
        save_as: fio_rf2be

      - action: fio_parse
        json_var: fio_rf2be
        metric: iops
        save_as: iops_rf2be

      - action: print
        msg: "RF=2 best_effort (RoCE): {{ iops_rf2be }} IOPS"

      - action: iscsi_cleanup
        node: m01
        ignore_error: true

  # === RF=2 sync_all ===
  - name: rf2-sync-all
    actions:
      - action: create_block_volume
        name: "roce-rf2sa"
        size_bytes: "{{ vol_size }}"
        replica_factor: "2"
        durability_mode: "sync_all"

      - action: wait_volume_healthy
        name: "roce-rf2sa"
        timeout: 60s

      - action: lookup_block_volume
        name: "roce-rf2sa"
        save_as: rf2sa

      - action: iscsi_login_direct
        node: m01
        host: "{{ rf2sa_iscsi_host }}"
        port: "{{ rf2sa_iscsi_port }}"
        iqn: "{{ rf2sa_iqn }}"
        save_as: dev_rf2sa

      - action: fio_json
        node: m01
        device: "{{ dev_rf2sa }}"
        rw: randwrite
        bs: 4k
        iodepth: "16"
        runtime: "30"
        time_based: "true"
        name: rf2-sync-all
        save_as: fio_rf2sa

      - action: fio_parse
        json_var: fio_rf2sa
        metric: iops
        save_as: iops_rf2sa

      - action: print
        msg: "RF=2 sync_all (RoCE):    {{ iops_rf2sa }} IOPS"

      - action: iscsi_cleanup
        node: m01
        ignore_error: true

  - name: results
    actions:
      - action: print
        msg: "=== Replication Tax — 25Gbps RoCE (4K randwrite QD16) ==="
      - action: print
        msg: "RF=1 (no repl):       {{ iops_rf1 }} IOPS"
      - action: print
        msg: "RF=2 best_effort:     {{ iops_rf2be }} IOPS"
      - action: print
        msg: "RF=2 sync_all:        {{ iops_rf2sa }} IOPS"

      - action: collect_results
        title: "Replication Tax — 25Gbps RoCE"

  - name: cleanup
    always: true
    actions:
      - action: iscsi_cleanup
        node: m01
        ignore_error: true
      - action: stop_weed
        node: m01
        pid: "{{ vs2_pid }}"
        ignore_error: true
      - action: stop_weed
        node: m02
        pid: "{{ vs1_pid }}"
        ignore_error: true
      - action: stop_weed
        node: m02
        pid: "{{ master_pid }}"
        ignore_error: true
