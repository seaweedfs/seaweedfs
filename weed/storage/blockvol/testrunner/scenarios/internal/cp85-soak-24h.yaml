name: cp85-soak-24h
timeout: 25h
env:
  repo_dir: "C:/work/seaweedfs"

topology:
  nodes:
    target_node:
      host: "192.168.1.184"
      user: testdev
      key: "C:/work/dev_server/testdev_key"
    client_node:
      host: "192.168.1.181"
      user: testdev
      key: "C:/work/dev_server/testdev_key"

targets:
  primary:
    node: target_node
    vol_size: 500M
    iscsi_port: 3270
    admin_port: 8090
    rebuild_port: 9030
    iqn_suffix: cp85-soak24h-primary
  replica:
    node: target_node
    vol_size: 500M
    iscsi_port: 3271
    admin_port: 8091
    replica_data_port: 9031
    replica_ctrl_port: 9032
    rebuild_port: 9033
    iqn_suffix: cp85-soak24h-replica

phases:
  - name: setup
    actions:
      - action: kill_stale
        node: target_node
        ignore_error: true
      - action: iscsi_cleanup
        node: client_node
        ignore_error: true
      - action: build_deploy
      - action: start_target
        target: primary
        create: "true"
      - action: start_target
        target: replica
        create: "true"
      - action: assign
        target: replica
        epoch: "1"
        role: replica
        lease_ttl: 3600s
      - action: assign
        target: primary
        epoch: "1"
        role: primary
        lease_ttl: 3600s
      - action: set_replica
        target: primary
        replica: replica
      - action: iscsi_login
        target: primary
        node: client_node
        save_as: device

  # 48 x 30min segments = 24h.
  # Each segment: write batch -> read verify -> scrape.
  # Faults injected at segments 8, 16, 24, 32, 40 (every ~4h).
  - name: soak_segment
    repeat: 48
    actions:
      - action: dd_write
        node: client_node
        device: "{{ device }}"
        bs: 64k
        count: "256"
        save_as: soak_write_md5
      - action: dd_read_md5
        node: client_node
        device: "{{ device }}"
        bs: 64k
        count: "256"
        save_as: soak_read_md5
      - action: assert_equal
        actual: "{{ soak_read_md5 }}"
        expected: "{{ soak_write_md5 }}"
      - action: fio
        node: client_node
        device: "{{ device }}"
        rw: randrw
        bs: 4k
        iodepth: "16"
        runtime: "1740"
        name: soak_segment
        save_as: soak_fio
      - action: scrape_metrics
        target: primary
        save_as: soak_metrics

  # Periodic fault injection via separate phase (runs after all soak segments).
  # For truly interleaved faults, operator can run the fault scenarios separately.
  - name: fault_pulse
    actions:
      - action: inject_netem
        node: target_node
        target_ip: "127.0.0.1"
        delay_ms: "100"
      - action: dd_write
        node: client_node
        device: "{{ device }}"
        bs: 4k
        count: "64"
        save_as: fault_md5
      - action: dd_read_md5
        node: client_node
        device: "{{ device }}"
        bs: 4k
        count: "64"
        save_as: fault_read
      - action: assert_equal
        actual: "{{ fault_read }}"
        expected: "{{ fault_md5 }}"
      - action: clear_fault
        type: netem
        node: target_node
      - action: sleep
        duration: 5s

  - name: final_verify
    actions:
      - action: scrape_metrics
        target: primary
        save_as: metrics_final
      - action: perf_summary
        target: primary
        save_as: perf_final
      - action: dd_write
        node: client_node
        device: "{{ device }}"
        bs: 1M
        count: "4"
        save_as: final_write_md5
      - action: dd_read_md5
        node: client_node
        device: "{{ device }}"
        bs: 1M
        count: "4"
        save_as: final_read_md5
      - action: assert_equal
        actual: "{{ final_read_md5 }}"
        expected: "{{ final_write_md5 }}"

  - name: cleanup
    always: true
    actions:
      - action: clear_fault
        type: netem
        node: target_node
        ignore_error: true
      - action: iscsi_cleanup
        node: client_node
        ignore_error: true
      - action: stop_all_targets
        ignore_error: true
