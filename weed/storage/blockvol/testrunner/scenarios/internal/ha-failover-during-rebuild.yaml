# F7: Failover During Rebuild
#
# Tests: primary dies while replica is mid-rebuild (full extent copy).
# Expected: rebuilding replica cannot be promoted (role=Rebuilding),
# system correctly reports unavailable state. After primary restarts
# and is re-assigned, rebuild can complete.
#
# Gap: Previously untested (identified in integration-test-catalog.md)
#
# Pass criteria:
# - Rebuilding replica is NOT promoted (role stays Rebuilding or Stale)
# - After primary restarts, rebuild restarts from scratch and completes
# - Data written before the first failover is intact

name: ha-failover-during-rebuild
timeout: 10m
env:
  repo_dir: "C:/work/seaweedfs"

topology:
  nodes:
    target_node:
      host: "192.168.1.184"
      user: testdev
      key: "C:/work/dev_server/testdev_key"
    client_node:
      host: "192.168.1.181"
      user: testdev
      key: "C:/work/dev_server/testdev_key"

targets:
  primary:
    node: target_node
    vol_size: 100M
    iscsi_port: 3260
    admin_port: 8080
    rebuild_port: 9020
    iqn_suffix: f7-primary
  replica:
    node: target_node
    vol_size: 100M
    iscsi_port: 3261
    admin_port: 8081
    replica_data_port: 9011
    replica_ctrl_port: 9012
    rebuild_port: 9013
    iqn_suffix: f7-replica

phases:
  - name: setup
    actions:
      - action: kill_stale
        node: target_node
        ignore_error: true
      - action: kill_stale
        node: client_node
        iscsi_cleanup: "true"
        ignore_error: true
      - action: build_deploy
      - action: start_target
        target: primary
        create: "true"
      - action: start_target
        target: replica
        create: "true"
      - action: assign
        target: replica
        epoch: "1"
        role: replica
        lease_ttl: 60s
      - action: assign
        target: primary
        epoch: "1"
        role: primary
        lease_ttl: 60s
      - action: set_replica
        target: primary
        replica: replica

  - name: write_data
    actions:
      - action: iscsi_login
        target: primary
        node: client_node
        save_as: device
      # Write enough data to make rebuild take noticeable time.
      - action: dd_write
        node: client_node
        device: "{{ device }}"
        bs: 1M
        count: "50"
        save_as: md5_original
      - action: wait_lsn
        target: replica
        min_lsn: "1"
        timeout: 15s

  - name: kill_replica_and_write_more
    actions:
      # Kill replica so it becomes stale and needs rebuild.
      - action: kill_target
        target: replica
      - action: sleep
        duration: 1s
      # Write more data that the replica missed.
      - action: dd_write
        node: client_node
        device: "{{ device }}"
        bs: 1M
        count: "10"
        seek: "50"
        save_as: md5_extra
      - action: iscsi_cleanup
        node: client_node
        ignore_error: true

  - name: start_rebuild_then_kill_primary
    actions:
      # Restart replica and begin rebuild.
      - action: start_target
        target: replica
        create: "true"
      - action: assign
        target: replica
        epoch: "1"
        role: rebuilding
        lease_ttl: 60s
      - action: start_rebuild_client
        target: replica
        primary: primary
        epoch: "1"
      # Give rebuild just enough time to start but not finish.
      - action: sleep
        duration: 2s
      # Kill primary while replica is mid-rebuild.
      - action: kill_target
        target: primary

  - name: verify_rebuild_incomplete
    actions:
      # The rebuilding replica should NOT be promotable.
      # Check its role is still rebuilding or stale (not primary).
      - action: wait_role
        target: replica
        role: rebuilding
        timeout: 5s

  - name: restart_primary_and_complete
    actions:
      # Restart the primary — it still has all the data.
      - action: start_target
        target: primary
        create: "true"
      - action: assign
        target: primary
        epoch: "2"
        role: primary
        lease_ttl: 60s
      # Restart rebuild from the revived primary.
      - action: assign
        target: replica
        epoch: "2"
        role: rebuilding
        lease_ttl: 60s
      - action: start_rebuild_client
        target: replica
        primary: primary
        epoch: "2"
      - action: wait_role
        target: replica
        role: replica
        timeout: 60s

  - name: verify_data
    actions:
      - action: iscsi_login
        target: primary
        node: client_node
        save_as: device2
      # Verify the extra data written after replica was killed.
      - action: dd_read_md5
        node: client_node
        device: "{{ device2 }}"
        bs: 1M
        count: "10"
        skip: "50"
        save_as: read_extra
      - action: assert_equal
        actual: "{{ read_extra }}"
        expected: "{{ md5_extra }}"

  - name: cleanup
    always: true
    actions:
      - action: iscsi_cleanup
        node: client_node
        ignore_error: true
      - action: stop_all_targets
        ignore_error: true
