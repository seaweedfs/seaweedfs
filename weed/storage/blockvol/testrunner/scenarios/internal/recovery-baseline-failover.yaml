name: recovery-baseline-failover
timeout: 10m

# Robust dimension: automatic failover after primary death.
#
# Stage 1 runtime scenario:
#   1. Create RF=2 sync_all volume
#   2. Bootstrap: small write + explicit fsync = first durability fence
#   3. wait_volume_healthy (now valid: barrier established durable truth)
#   4. Sustained workload: fio + large dd_write with checksum
#   5. Kill primary VS (SIGKILL)
#   6. Wait for lease expiry (30s TTL + margin)
#   7. Verify: master auto-promotes replica to primary
#   8. Reconnect iSCSI to new primary, verify data continuity + I/O
#
# Stage 0 closure now lives in `recovery-bootstrap-closure.yaml`. This file keeps
# the heavier workload and failover path together as the next-stage scenario.
#
# Key contract rule: publish_healthy requires DurableLSN > 0, which
# requires at least one successful barrier. So wait_volume_healthy
# must come AFTER the first durability fence, not before any writes.

env:
  master_url: "http://10.0.0.3:9433"
  volume_name: rb-failover
  vol_size: "1073741824"

topology:
  nodes:
    m01:
      host: 192.168.1.181
      alt_ips: ["10.0.0.1"]
      user: testdev
      key: "/opt/work/testdev_key"
    m02:
      host: 192.168.1.184
      alt_ips: ["10.0.0.3"]
      user: testdev
      key: "/opt/work/testdev_key"

phases:
  - name: cluster-start
    actions:
      - action: exec
        node: m02
        cmd: "fuser -k 9433/tcp 18480/tcp 2>/dev/null; sleep 1; rm -rf /tmp/sw-fo-master /tmp/sw-fo-vs1 && mkdir -p /tmp/sw-fo-master /tmp/sw-fo-vs1/blocks"
        root: "true"
        ignore_error: true
      - action: exec
        node: m01
        cmd: "fuser -k 18480/tcp 2>/dev/null; sleep 1; rm -rf /tmp/sw-fo-vs2 && mkdir -p /tmp/sw-fo-vs2/blocks"
        root: "true"
        ignore_error: true

      - action: start_weed_master
        node: m02
        port: "9433"
        dir: /tmp/sw-fo-master
        extra_args: "-ip=10.0.0.3"
        save_as: master_pid

      - action: sleep
        duration: 3s

      - action: start_weed_volume
        node: m02
        port: "18480"
        master: "10.0.0.3:9433"
        dir: /tmp/sw-fo-vs1
        extra_args: "-block.dir=/tmp/sw-fo-vs1/blocks -block.listen=:3295 -ip=10.0.0.3"
        save_as: vs1_pid

      - action: start_weed_volume
        node: m01
        port: "18480"
        master: "10.0.0.3:9433"
        dir: /tmp/sw-fo-vs2
        extra_args: "-block.dir=/tmp/sw-fo-vs2/blocks -block.listen=:3295 -ip=10.0.0.1"
        save_as: vs2_pid

      - action: sleep
        duration: 3s

      - action: wait_cluster_ready
        node: m02
        master_url: "{{ master_url }}"

      - action: wait_block_servers
        count: "2"

  - name: create-volume
    actions:
      - action: create_block_volume
        name: "{{ volume_name }}"
        size_bytes: "{{ vol_size }}"
        replica_factor: "2"
        durability_mode: "sync_all"

  # Phase 1: Bootstrap — establish first durability fence.
  # A fresh sync_all volume needs one successful barrier before
  # publish_healthy can be reached (DurableLSN > 0 gate).
  - name: bootstrap-fence
    actions:
      - action: discover_primary
        name: "{{ volume_name }}"
        save_as: before

      - action: print
        msg: "Before: primary={{ before }} ({{ before_server }}), replica={{ before_replica_node }}"

      - action: lookup_block_volume
        name: "{{ volume_name }}"
        save_as: vol

      # Wait for shipper to be configured (assignment delivered + shipper wired).
      # 10s is enough for heartbeat cycle + assignment delivery + shipper setup.
      - action: sleep
        duration: 10s

      - action: iscsi_login_direct
        node: m01
        host: "{{ vol_iscsi_host }}"
        port: "{{ vol_iscsi_port }}"
        iqn: "{{ vol_iqn }}"
        save_as: device

      # Bootstrap write: small, explicit fsync = first durability fence.
      # This is NOT the main workload — it's the minimal write needed to
      # establish barrier truth so publish_healthy becomes reachable.
      - action: dd_write
        node: m01
        device: "{{ device }}"
        bs: 4k
        count: "1"
        sync_mode: fsync
        save_as: bootstrap_md5

      - action: print
        msg: "Bootstrap fence passed — first barrier confirmed (md5={{ bootstrap_md5 }})"

      # NOW wait_volume_healthy is valid: barrier has established DurableLSN > 0.
      - action: wait_volume_healthy
        name: "{{ volume_name }}"
        timeout: 60s

      - action: print
        msg: "Volume healthy — bootstrap closure complete"

  # Phase 2: Main workload — fio + dd_write with checksum for data continuity.
  - name: record-before
    actions:
      - action: fio_json
        node: m01
        device: "{{ device }}"
        rw: randwrite
        bs: 4k
        iodepth: "16"
        runtime: "10"
        time_based: "true"
        name: pre-write

      - action: dd_write
        node: m01
        device: "{{ device }}"
        bs: 1M
        count: "2"
        seek: "16"
        sync_mode: fsync
        save_as: pre_failover_md5

      - action: dd_read_md5
        node: m01
        device: "{{ device }}"
        bs: 1M
        count: "2"
        skip: "16"
        save_as: pre_failover_verify

      - action: assert_equal
        actual: "{{ pre_failover_verify }}"
        expected: "{{ pre_failover_md5 }}"

      - action: iscsi_cleanup
        node: m01
        ignore_error: true

  - name: kill-primary
    actions:
      - action: print
        msg: "=== Killing primary ({{ before_server }}) ==="

      - action: exec
        node: m02
        cmd: "kill -9 {{ vs1_pid }}"
        root: "true"
        ignore_error: true

      - action: print
        msg: "Primary killed. Waiting for lease expiry (45s)..."

      - action: sleep
        duration: 45s

  - name: verify-auto-failover
    actions:
      - action: wait_block_primary
        name: "{{ volume_name }}"
        not: "{{ before_server }}"
        timeout: 60s
        save_as: after

      - action: wait_volume_healthy
        name: "{{ volume_name }}"
        timeout: 60s

      - action: discover_primary
        name: "{{ volume_name }}"
        save_as: new_pri

      - action: print
        msg: "After auto-failover: primary={{ new_pri }} ({{ new_pri_server }})"

      - action: print
        msg: "AUTO-FAILOVER VERIFIED: {{ before_server }} → {{ new_pri_server }}"

  - name: verify-io-after
    actions:
      - action: iscsi_login_direct
        node: m01
        host: "10.0.0.1"
        port: "3295"
        iqn: "{{ vol_iqn }}"
        save_as: device2

      - action: dd_read_md5
        node: m01
        device: "{{ device2 }}"
        bs: 1M
        count: "2"
        skip: "16"
        save_as: post_failover_md5

      - action: assert_equal
        actual: "{{ post_failover_md5 }}"
        expected: "{{ pre_failover_md5 }}"

      - action: fio_json
        node: m01
        device: "{{ device2 }}"
        rw: randwrite
        bs: 4k
        iodepth: "16"
        runtime: "10"
        time_based: "true"
        name: post-failover-write
        save_as: fio_after

      - action: fio_parse
        json_var: fio_after
        metric: iops
        save_as: iops_after

      - action: print
        msg: "Post-failover write IOPS: {{ iops_after }}"

      - action: iscsi_cleanup
        node: m01
        ignore_error: true

  - name: cleanup
    always: true
    actions:
      - action: iscsi_cleanup
        node: m01
        ignore_error: true
      - action: stop_weed
        node: m01
        pid: "{{ vs2_pid }}"
        ignore_error: true
      - action: stop_weed
        node: m02
        pid: "{{ vs1_pid }}"
        ignore_error: true
      - action: stop_weed
        node: m02
        pid: "{{ master_pid }}"
        ignore_error: true
