  - name: final_verify
    actions:
      - action: assert_equal
        actual: "{{ read_iter5 }}"
        expected: "{{ md5_iter5 }}"
      - action: print
        msg: "All 5 primary-kill iterations passed. Final epoch=6."

  - name: cleanup
    always: true
    actions:
      - action: iscsi_cleanup
        node: client_node
        ignore_error: true
      - action: stop_all_targets
        ignore_error: true
