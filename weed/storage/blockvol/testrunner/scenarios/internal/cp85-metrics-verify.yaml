name: cp85-metrics-verify
timeout: 10m
env:
  repo_dir: "C:/work/seaweedfs"

topology:
  nodes:
    target_node:
      host: "192.168.1.184"
      user: testdev
      key: "C:/work/dev_server/testdev_key"
    client_node:
      host: "192.168.1.181"
      user: testdev
      key: "C:/work/dev_server/testdev_key"

targets:
  primary:
    node: target_node
    vol_size: 100M
    iscsi_port: 3270
    admin_port: 8090
    rebuild_port: 9030
    iqn_suffix: cp85-metrics-primary
  replica:
    node: target_node
    vol_size: 100M
    iscsi_port: 3271
    admin_port: 8091
    replica_data_port: 9031
    replica_ctrl_port: 9032
    rebuild_port: 9033
    iqn_suffix: cp85-metrics-replica

phases:
  - name: setup
    actions:
      - action: kill_stale
        node: target_node
        ignore_error: true
      - action: iscsi_cleanup
        node: client_node
        ignore_error: true
      - action: build_deploy
      - action: start_target
        target: primary
        create: "true"
      - action: start_target
        target: replica
        create: "true"
      - action: assign
        target: replica
        epoch: "1"
        role: replica
        lease_ttl: 60s
      - action: assign
        target: primary
        epoch: "1"
        role: primary
        lease_ttl: 60s
      - action: set_replica
        target: primary
        replica: replica
      - action: iscsi_login
        target: primary
        node: client_node
        save_as: device

  # H01: Write 4MB, verify flusher_bytes_total > 0.
  - name: h01_flusher_metrics
    actions:
      - action: dd_write
        node: client_node
        device: "{{ device }}"
        bs: 1M
        count: "4"
        save_as: md5_h01
      - action: sleep
        duration: 3s
      - action: scrape_metrics
        target: primary
        save_as: metrics_h01
      - action: assert_metric_gt
        metrics_var: metrics_h01
        metric: seaweedfs_blockvol_flusher_bytes_total
        threshold: "0"

  # H02: With replica, verify wal_shipped_entries_total > 0.
  - name: h02_wal_ship_metrics
    actions:
      - action: wait_lsn
        target: replica
        min_lsn: "1"
        timeout: 10s
      - action: scrape_metrics
        target: primary
        save_as: metrics_h02
      - action: assert_metric_gt
        metrics_var: metrics_h02
        metric: seaweedfs_blockvol_wal_shipped_entries_total
        threshold: "0"

  # H03: Network fault, verify barrier metrics present.
  - name: h03_barrier_under_fault
    actions:
      - action: inject_netem
        node: target_node
        target_ip: "127.0.0.1"
        delay_ms: "200"
      - action: dd_write
        node: client_node
        device: "{{ device }}"
        bs: 4k
        count: "64"
        save_as: md5_h03
        ignore_error: true
      - action: sleep
        duration: 3s
      - action: scrape_metrics
        target: primary
        save_as: metrics_h03
      - action: clear_fault
        type: netem
        node: target_node

  - name: cleanup
    always: true
    actions:
      - action: clear_fault
        type: netem
        node: target_node
        ignore_error: true
      - action: iscsi_cleanup
        node: client_node
        ignore_error: true
      - action: stop_all_targets
        ignore_error: true
