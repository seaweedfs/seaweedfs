# HA RF3 Failover (Multi-Replica)
#
# Tests failover with 3 replicas (RF3). When primary dies, the replica
# with the highest WAL LSN should be promoted. The remaining replica
# continues as replica under the new primary.
#
# Topology: primary + replica_a + replica_b (all on M02, different ports)
#
# Pass criteria:
# - Data replicated to both replicas
# - After primary kill, promoted replica has correct data
# - Remaining replica can rebuild from new primary

name: ha-rf3-failover
timeout: 5m
env:
  repo_dir: "C:/work/seaweedfs"

topology:
  nodes:
    target_node:
      host: "192.168.1.184"
      user: testdev
      key: "C:/work/dev_server/testdev_key"
    client_node:
      host: "192.168.1.181"
      user: testdev
      key: "C:/work/dev_server/testdev_key"

targets:
  primary:
    node: target_node
    vol_size: 50M
    iscsi_port: 3270
    admin_port: 8090
    replica_data_port: 9021
    replica_ctrl_port: 9022
    rebuild_port: 9031
    iqn_suffix: rf3-primary
  replica_a:
    node: target_node
    vol_size: 50M
    iscsi_port: 3271
    admin_port: 8091
    replica_data_port: 9023
    replica_ctrl_port: 9024
    rebuild_port: 9032
    iqn_suffix: rf3-replica-a
  replica_b:
    node: target_node
    vol_size: 50M
    iscsi_port: 3272
    admin_port: 8092
    replica_data_port: 9025
    replica_ctrl_port: 9026
    rebuild_port: 9033
    iqn_suffix: rf3-replica-b

phases:
  - name: setup
    actions:
      - action: kill_stale
        node: target_node
      - action: kill_stale
        node: client_node
        iscsi_cleanup: "true"
      - action: build_deploy
      - action: start_target
        target: primary
        create: "true"
      - action: start_target
        target: replica_a
        create: "true"
      - action: start_target
        target: replica_b
        create: "true"
      # Assign roles
      - action: assign
        target: primary
        epoch: "1"
        role: primary
        lease_ttl: 120s
      - action: assign
        target: replica_a
        epoch: "1"
        role: replica
      - action: assign
        target: replica_b
        epoch: "1"
        role: replica
      # Set up replication: primary → replica_a, primary → replica_b
      - action: set_replica
        target: primary
        replica: replica_a
      # Note: second set_replica would need multi-replica support
      # For now, test with one replica and verify architecture

  - name: write_data
    actions:
      - action: iscsi_login
        target: primary
        node: client_node
        save_as: device
      - action: dd_write
        node: client_node
        device: "{{ device }}"
        bs: 1M
        count: "5"
        save_as: md5_original
      - action: wait_lsn
        target: replica_a
        min_lsn: "1"
        timeout: 10s

  - name: kill_primary
    actions:
      - action: iscsi_cleanup
        node: client_node
      - action: kill_target
        target: primary

  - name: promote_replica_a
    actions:
      - action: assign
        target: replica_a
        epoch: "2"
        role: primary
        lease_ttl: 120s
      - action: wait_role
        target: replica_a
        role: primary
        timeout: 10s

  - name: verify_data
    actions:
      - action: iscsi_login
        target: replica_a
        node: client_node
        save_as: device2
      - action: dd_read_md5
        node: client_node
        device: "{{ device2 }}"
        bs: 1M
        count: "5"
        save_as: md5_verify
      - action: assert_equal
        actual: "{{ md5_verify }}"
        expected: "{{ md5_original }}"

  - name: cleanup
    always: true
    actions:
      - action: iscsi_cleanup
        node: client_node
        ignore_error: true
      - action: stop_all_targets
        ignore_error: true
