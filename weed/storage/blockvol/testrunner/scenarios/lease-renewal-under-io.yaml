# Lease Renewal Under I/O
#
# Tests that lease renewal (re-assignment with same epoch+role) works
# correctly while I/O is in flight. The lease should be extended
# without disrupting ongoing writes.
#
# Pass criteria:
# - Writes succeed before, during, and after lease renewal
# - Data is consistent across all phases
# - Status shows has_lease=true throughout

name: lease-renewal-under-io
timeout: 5m
env:
  repo_dir: "C:/work/seaweedfs"

topology:
  nodes:
    target_node:
      host: "192.168.1.184"
      user: testdev
      key: "C:/work/dev_server/testdev_key"
    client_node:
      host: "192.168.1.181"
      user: testdev
      key: "C:/work/dev_server/testdev_key"

targets:
  primary:
    node: target_node
    vol_size: 50M
    iscsi_port: 3270
    admin_port: 8090
    iqn_suffix: lease-renew

phases:
  - name: setup
    actions:
      - action: kill_stale
        node: target_node
      - action: kill_stale
        node: client_node
        iscsi_cleanup: "true"
      - action: build_deploy
      - action: start_target
        target: primary
        create: "true"
      - action: assign
        target: primary
        epoch: "1"
        role: primary
        lease_ttl: 10s
      - action: iscsi_login
        target: primary
        node: client_node
        save_as: device

  - name: write_before_renewal
    actions:
      - action: dd_write
        node: client_node
        device: "{{ device }}"
        bs: 1M
        count: "5"
        save_as: md5_before
      - action: assert_status
        target: primary
        field: has_lease
        expected: "true"

  - name: renew_lease_during_io
    actions:
      # Start background writes
      - action: write_loop_bg
        node: client_node
        device: "{{ device }}"
        save_as: bg_pid
      # Sleep 3s to let writes accumulate
      - action: sleep
        duration: 3s
      # Renew lease (same epoch, same role, new TTL)
      - action: assign
        target: primary
        epoch: "1"
        role: primary
        lease_ttl: 30s
      # Verify lease still valid
      - action: assert_status
        target: primary
        field: has_lease
        expected: "true"
      # Continue writing for a bit
      - action: sleep
        duration: 2s
      - action: stop_bg
        node: client_node
        pid: "{{ bg_pid }}"

  - name: write_after_renewal
    actions:
      - action: dd_write
        node: client_node
        device: "{{ device }}"
        bs: 1M
        count: "5"
        save_as: md5_after
      - action: dd_read_md5
        node: client_node
        device: "{{ device }}"
        bs: 1M
        count: "5"
        save_as: verify_after
      - action: assert_equal
        actual: "{{ verify_after }}"
        expected: "{{ md5_after }}"

  - name: verify_lease_expiry
    actions:
      # Wait for the 30s lease to expire
      - action: sleep
        duration: 32s
      - action: assert_status
        target: primary
        field: has_lease
        expected: "false"

  - name: cleanup
    always: true
    actions:
      - action: stop_bg
        node: client_node
        pid: "{{ bg_pid }}"
        ignore_error: true
      - action: iscsi_cleanup
        node: client_node
        ignore_error: true
      - action: stop_all_targets
        ignore_error: true
