name: "CP10-3 Performance Baseline: iSCSI vs NVMe A/B"
timeout: "30m"

env:
  vol_name: "bench-vol"
  vol_size: "1073741824"  # 1GB

topology:
  nodes:
    server:
      host: "192.168.1.184"
      user: "testdev"
      key: "/home/testdev/.ssh/id_ed25519"
    client:
      host: "192.168.1.181"
      is_local: true

targets:
  primary:
    node: server
    vol_size: "1073741824"
    wal_size: "536870912"
    iscsi_port: 3263
    nvme_port: 4420
    admin_port: 8083
    iqn_suffix: "bench-vol"
    nqn_suffix: "bench-vol"

phases:
  # --- Setup ---
  - name: setup
    actions:
      - action: kill_stale
        node: client
      - action: kill_stale
        node: server
      - action: kill_stale
        node: server
        process: block-csi
      - action: start_target
        target: primary
        create: "true"

  # --- iSCSI benchmark ---
  - name: iscsi-connect
    actions:
      - action: iscsi_login
        target: primary
        node: client
        save_as: iscsi_device

  - name: iscsi-bench
    actions:
      # B-01: 4K randwrite QD=1 (protocol latency)
      - action: fio_json
        node: client
        save_as: iscsi_4k_rw_qd1
        device: "{{iscsi_device}}"
        rw: randwrite
        bs: 4k
        iodepth: "1"
        numjobs: "1"
        runtime: "60"
        name: "4k-randwrite-qd1"

      # B-02: 4K randwrite j=1 QD=32 (single-queue saturation)
      - action: fio_json
        node: client
        save_as: iscsi_4k_rw_qd32
        device: "{{iscsi_device}}"
        rw: randwrite
        bs: 4k
        iodepth: "32"
        numjobs: "1"
        runtime: "60"
        name: "4k-randwrite-qd32"

      # B-03: 4K randwrite j=4 QD=32 (multi-queue scaling)
      - action: fio_json
        node: client
        save_as: iscsi_4k_rw_j4_qd32
        device: "{{iscsi_device}}"
        rw: randwrite
        bs: 4k
        iodepth: "32"
        numjobs: "4"
        runtime: "60"
        name: "4k-randwrite-j4-qd32"

      # B-04: 4K randread QD=1 (read latency)
      - action: fio_json
        node: client
        save_as: iscsi_4k_rd_qd1
        device: "{{iscsi_device}}"
        rw: randread
        bs: 4k
        iodepth: "1"
        numjobs: "1"
        runtime: "60"
        name: "4k-randread-qd1"

      # B-05: 4K randread j=4 QD=32 (multi-queue read scaling)
      - action: fio_json
        node: client
        save_as: iscsi_4k_rd_j4_qd32
        device: "{{iscsi_device}}"
        rw: randread
        bs: 4k
        iodepth: "32"
        numjobs: "4"
        runtime: "60"
        name: "4k-randread-j4-qd32"

      # B-06: 64K seqwrite QD=4 (bandwidth single-queue)
      - action: fio_json
        node: client
        save_as: iscsi_64k_sw_qd4
        device: "{{iscsi_device}}"
        rw: write
        bs: 64k
        iodepth: "4"
        numjobs: "1"
        runtime: "60"
        name: "64k-seqwrite-qd4"

      # B-07: 64K seqwrite j=4 QD=4 (bandwidth scaling)
      - action: fio_json
        node: client
        save_as: iscsi_64k_sw_j4_qd4
        device: "{{iscsi_device}}"
        rw: write
        bs: 64k
        iodepth: "4"
        numjobs: "4"
        runtime: "60"
        name: "64k-seqwrite-j4-qd4"

      # B-08: 64K seqread QD=4 (read bandwidth single-queue)
      - action: fio_json
        node: client
        save_as: iscsi_64k_sr_qd4
        device: "{{iscsi_device}}"
        rw: read
        bs: 64k
        iodepth: "4"
        numjobs: "1"
        runtime: "60"
        name: "64k-seqread-qd4"

      # B-09: 64K seqread j=4 QD=4 (read bandwidth scaling)
      - action: fio_json
        node: client
        save_as: iscsi_64k_sr_j4_qd4
        device: "{{iscsi_device}}"
        rw: read
        bs: 64k
        iodepth: "4"
        numjobs: "4"
        runtime: "60"
        name: "64k-seqread-j4-qd4"

      # B-10: Mixed 70/30 j=4 QD=32 (DB-like pattern)
      - action: fio_json
        node: client
        save_as: iscsi_mixed
        device: "{{iscsi_device}}"
        rw: randrw
        rwmixread: "70"
        bs: 4k
        iodepth: "32"
        numjobs: "4"
        runtime: "60"
        name: "mixed-70-30-j4-qd32"

  - name: iscsi-disconnect
    actions:
      - action: iscsi_logout
        target: primary
        node: client

  # --- NVMe benchmark ---
  - name: nvme-connect
    actions:
      - action: nvme_connect
        target: primary
        node: client
        save_as: nvme_nqn
      - action: nvme_get_device
        target: primary
        node: client
        save_as: nvme_device

  - name: nvme-bench
    actions:
      # B-01: 4K randwrite QD=1
      - action: fio_json
        node: client
        save_as: nvme_4k_rw_qd1
        device: "{{nvme_device}}"
        rw: randwrite
        bs: 4k
        iodepth: "1"
        numjobs: "1"
        runtime: "60"
        name: "4k-randwrite-qd1"

      # B-02: 4K randwrite j=1 QD=32
      - action: fio_json
        node: client
        save_as: nvme_4k_rw_qd32
        device: "{{nvme_device}}"
        rw: randwrite
        bs: 4k
        iodepth: "32"
        numjobs: "1"
        runtime: "60"
        name: "4k-randwrite-qd32"

      # B-03: 4K randwrite j=4 QD=32
      - action: fio_json
        node: client
        save_as: nvme_4k_rw_j4_qd32
        device: "{{nvme_device}}"
        rw: randwrite
        bs: 4k
        iodepth: "32"
        numjobs: "4"
        runtime: "60"
        name: "4k-randwrite-j4-qd32"

      # B-04: 4K randread QD=1
      - action: fio_json
        node: client
        save_as: nvme_4k_rd_qd1
        device: "{{nvme_device}}"
        rw: randread
        bs: 4k
        iodepth: "1"
        numjobs: "1"
        runtime: "60"
        name: "4k-randread-qd1"

      # B-05: 4K randread j=4 QD=32
      - action: fio_json
        node: client
        save_as: nvme_4k_rd_j4_qd32
        device: "{{nvme_device}}"
        rw: randread
        bs: 4k
        iodepth: "32"
        numjobs: "4"
        runtime: "60"
        name: "4k-randread-j4-qd32"

      # B-06: 64K seqwrite QD=4
      - action: fio_json
        node: client
        save_as: nvme_64k_sw_qd4
        device: "{{nvme_device}}"
        rw: write
        bs: 64k
        iodepth: "4"
        numjobs: "1"
        runtime: "60"
        name: "64k-seqwrite-qd4"

      # B-07: 64K seqwrite j=4 QD=4
      - action: fio_json
        node: client
        save_as: nvme_64k_sw_j4_qd4
        device: "{{nvme_device}}"
        rw: write
        bs: 64k
        iodepth: "4"
        numjobs: "4"
        runtime: "60"
        name: "64k-seqwrite-j4-qd4"

      # B-08: 64K seqread QD=4
      - action: fio_json
        node: client
        save_as: nvme_64k_sr_qd4
        device: "{{nvme_device}}"
        rw: read
        bs: 64k
        iodepth: "4"
        numjobs: "1"
        runtime: "60"
        name: "64k-seqread-qd4"

      # B-09: 64K seqread j=4 QD=4
      - action: fio_json
        node: client
        save_as: nvme_64k_sr_j4_qd4
        device: "{{nvme_device}}"
        rw: read
        bs: 64k
        iodepth: "4"
        numjobs: "4"
        runtime: "60"
        name: "64k-seqread-j4-qd4"

      # B-10: Mixed 70/30 j=4 QD=32
      - action: fio_json
        node: client
        save_as: nvme_mixed
        device: "{{nvme_device}}"
        rw: randrw
        rwmixread: "70"
        bs: 4k
        iodepth: "32"
        numjobs: "4"
        runtime: "60"
        name: "mixed-70-30-j4-qd32"

  - name: nvme-disconnect
    actions:
      - action: nvme_disconnect
        target: primary
        node: client

  # --- Comparison ---
  - name: compare
    actions:
      # 4K IOPS gates: NVMe >= 90% of iSCSI (warn at 80%)
      - action: bench_compare
        save_as: cmp_4k_rw_qd1
        a_var: iscsi_4k_rw_qd1
        b_var: nvme_4k_rw_qd1
        metric: iops
        gate: "0.9"
        warn_gate: "0.8"

      - action: bench_compare
        save_as: cmp_4k_rw_qd32
        a_var: iscsi_4k_rw_qd32
        b_var: nvme_4k_rw_qd32
        metric: iops
        gate: "0.9"
        warn_gate: "0.8"

      - action: bench_compare
        save_as: cmp_4k_rw_j4_qd32
        a_var: iscsi_4k_rw_j4_qd32
        b_var: nvme_4k_rw_j4_qd32
        metric: iops
        gate: "0.9"
        warn_gate: "0.8"

      - action: bench_compare
        save_as: cmp_4k_rd_qd1
        a_var: iscsi_4k_rd_qd1
        b_var: nvme_4k_rd_qd1
        metric: iops
        gate: "0.9"
        warn_gate: "0.8"

      - action: bench_compare
        save_as: cmp_4k_rd_j4_qd32
        a_var: iscsi_4k_rd_j4_qd32
        b_var: nvme_4k_rd_j4_qd32
        metric: iops
        gate: "0.9"
        warn_gate: "0.8"

      # 64K bandwidth gates
      - action: bench_compare
        save_as: cmp_64k_sw_qd4
        a_var: iscsi_64k_sw_qd4
        b_var: nvme_64k_sw_qd4
        metric: bw_mb
        gate: "0.9"
        warn_gate: "0.8"

      - action: bench_compare
        save_as: cmp_64k_sw_j4_qd4
        a_var: iscsi_64k_sw_j4_qd4
        b_var: nvme_64k_sw_j4_qd4
        metric: bw_mb
        gate: "0.9"
        warn_gate: "0.8"

      - action: bench_compare
        save_as: cmp_64k_sr_qd4
        a_var: iscsi_64k_sr_qd4
        b_var: nvme_64k_sr_qd4
        metric: bw_mb
        gate: "0.9"
        warn_gate: "0.8"

      - action: bench_compare
        save_as: cmp_64k_sr_j4_qd4
        a_var: iscsi_64k_sr_j4_qd4
        b_var: nvme_64k_sr_j4_qd4
        metric: bw_mb
        gate: "0.9"
        warn_gate: "0.8"

      # Mixed IOPS gate (read-side only: in a 70/30 mixed workload, read IOPS
      # is the bottleneck indicator since writes benefit from group commit)
      - action: bench_compare
        save_as: cmp_mixed
        a_var: iscsi_mixed
        b_var: nvme_mixed
        metric: iops
        direction: read
        gate: "0.9"
        warn_gate: "0.8"

      # Latency comparison (4K write P99)
      - action: bench_compare
        save_as: cmp_lat_qd1
        a_var: iscsi_4k_rw_qd1
        b_var: nvme_4k_rw_qd1
        metric: lat_p99_us
        gate: "0.9"
        warn_gate: "0.8"

  # --- Cleanup ---
  - name: cleanup
    always: true
    actions:
      - action: nvme_cleanup
        node: client
        ignore_error: true
      - action: iscsi_cleanup
        node: client
        ignore_error: true
      - action: stop_all_targets
        node: server
        ignore_error: true
