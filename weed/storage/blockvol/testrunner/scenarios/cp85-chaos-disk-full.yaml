name: cp85-chaos-disk-full
timeout: 10m
env:
  repo_dir: "C:/work/seaweedfs"

topology:
  nodes:
    target_node:
      host: "192.168.1.184"
      user: testdev
      key: "C:/work/dev_server/testdev_key"
    client_node:
      host: "192.168.1.181"
      user: testdev
      key: "C:/work/dev_server/testdev_key"

targets:
  primary:
    node: target_node
    vol_size: 100M
    iscsi_port: 3270
    admin_port: 8090
    iqn_suffix: cp85-diskfull-primary

phases:
  - name: setup
    actions:
      - action: kill_stale
        node: target_node
        ignore_error: true
      - action: iscsi_cleanup
        node: client_node
        ignore_error: true
      - action: build_deploy
      - action: start_target
        target: primary
        create: "true"
      - action: assign
        target: primary
        epoch: "1"
        role: primary
        lease_ttl: 60s
      - action: iscsi_login
        target: primary
        node: client_node
        save_as: device

  - name: pre_fill_write
    actions:
      - action: dd_write
        node: client_node
        device: "{{ device }}"
        bs: 1M
        count: "2"
        save_as: md5_pre

  - name: fill_disk
    actions:
      - action: fill_disk
        node: target_node
        size: "90%"
      - action: sleep
        duration: 2s
      # Write should fail or stall due to disk full.
      - action: dd_write
        node: client_node
        device: "{{ device }}"
        bs: 4k
        count: "16"
        seek: "512"
        ignore_error: true
        save_as: md5_fault
      - action: scrape_metrics
        target: primary
        save_as: metrics_diskfull

  - name: clear_disk_full
    actions:
      - action: clear_fault
        type: disk_full
        node: target_node
      - action: sleep
        duration: 3s

  - name: verify_recovery
    actions:
      # Verify writes resume after clearing disk full.
      - action: dd_write
        node: client_node
        device: "{{ device }}"
        bs: 1M
        count: "1"
        seek: "4"
        save_as: md5_after
      - action: dd_read_md5
        node: client_node
        device: "{{ device }}"
        bs: 1M
        count: "1"
        skip: "4"
        save_as: read_after
      - action: assert_equal
        actual: "{{ read_after }}"
        expected: "{{ md5_after }}"
      # Verify original data is intact.
      - action: dd_read_md5
        node: client_node
        device: "{{ device }}"
        bs: 1M
        count: "2"
        save_as: read_pre
      - action: assert_equal
        actual: "{{ read_pre }}"
        expected: "{{ md5_pre }}"

  - name: cleanup
    always: true
    actions:
      - action: clear_fault
        type: disk_full
        node: target_node
        ignore_error: true
      - action: iscsi_cleanup
        node: client_node
        ignore_error: true
      - action: stop_all_targets
        ignore_error: true
