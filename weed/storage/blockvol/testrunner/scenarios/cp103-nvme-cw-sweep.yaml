        metric: iops
        save_as: cw32_rw_iops

  - name: cw32-4k-rd-qd32
    repeat: 3
    aggregate: median
    trim_pct: 0
    actions:
      - action: fio_json
        node: client
        device: "{{nvme_dev_32}}"
        rw: randread
        bs: 4k
        iodepth: "32"
        numjobs: "1"
        runtime: "30"
        name: "cw32-4k-rd-qd32"
        save_as: _fio_cw32_rd32
