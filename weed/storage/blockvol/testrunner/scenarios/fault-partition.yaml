name: fault-partition
timeout: 5m
env:
  repo_dir: "C:/work/seaweedfs"

topology:
  nodes:
    target_node:
      host: "192.168.1.184"
      user: testdev
      key: "C:/work/dev_server/testdev_key"
    client_node:
      host: "192.168.1.181"
      user: testdev
      key: "C:/work/dev_server/testdev_key"

targets:
  primary:
    node: target_node
    vol_size: 100M
    iscsi_port: 3260
    admin_port: 8080
    iqn_suffix: fault-part-primary
  replica:
    node: target_node
    vol_size: 100M
    iscsi_port: 3261
    admin_port: 8081
    replica_data_port: 9011
    replica_ctrl_port: 9012
    rebuild_port: 9013
    iqn_suffix: fault-part-replica

phases:
  - name: setup
    actions:
      - action: build_deploy
      - action: start_target
        target: primary
        create: "true"
      - action: start_target
        target: replica
        create: "true"
      - action: assign
        target: replica
        epoch: "1"
        role: replica
        lease_ttl: 10s
      - action: assign
        target: primary
        epoch: "1"
        role: primary
        lease_ttl: 10s
      - action: set_replica
        target: primary
        replica: replica

  - name: inject_partition
    actions:
      - action: inject_partition
        node: target_node
        target_ip: "127.0.0.1"
        ports: "9011,9012"

  - name: wait_for_lease_expiry
    actions:
      - action: sleep
        duration: 15s
      - action: assert_status
        target: primary
        has_lease: "false"

  - name: promote_replica
    actions:
      - action: assign
        target: replica
        epoch: "2"
        role: primary
        lease_ttl: 30s
      - action: wait_role
        target: replica
        role: primary
        timeout: 5s

  - name: cleanup
    always: true
    actions:
      - action: clear_fault
        type: partition
        node: target_node
        ignore_error: true
      - action: iscsi_cleanup
        node: client_node
        ignore_error: true
      - action: stop_all_targets
        ignore_error: true
