apiVersion: v1
kind: Namespace
metadata:
  name: sw-block-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sw-block-operator
  namespace: sw-block-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sw-block-operator
rules:
  # SeaweedBlockCluster CR
  - apiGroups: ["block.seaweedfs.com"]
    resources: ["seaweedblockclusters"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["block.seaweedfs.com"]
    resources: ["seaweedblockclusters/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["block.seaweedfs.com"]
    resources: ["seaweedblockclusters/finalizers"]
    verbs: ["update"]
  # Managed workloads
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Core resources
  - apiGroups: [""]
    resources: ["services", "serviceaccounts", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Cluster-scoped RBAC
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles", "clusterrolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Storage
  - apiGroups: ["storage.k8s.io"]
    resources: ["csidrivers", "storageclasses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Events (for recorder)
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sw-block-operator
subjects:
  - kind: ServiceAccount
    name: sw-block-operator
    namespace: sw-block-system
roleRef:
  kind: ClusterRole
  name: sw-block-operator
  apiGroup: rbac.authorization.k8s.io
