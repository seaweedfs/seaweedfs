## SeaweedFS BlockVol multipath configuration.
## Install to /etc/multipath/conf.d/sw-block.conf (or append to /etc/multipath.conf).
## Then: systemctl restart multipathd && multipath -ll
devices {
    device {
        vendor                "SeaweedF"
        product               "BlockVol"
        path_grouping_policy  group_by_tpg
        prio                  alua
        failback              followover
        no_path_retry         queue
    }
}
